name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e .
      - name: Test
        run: python tests/test_tracer.py

  node-build:
    name: Node (install, type-check, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: vibetrace-desktop
        run: npm install

      - name: Type check
        working-directory: vibetrace-desktop
        run: npx tsc --noEmit

      - name: Build
        working-directory: vibetrace-desktop
        run: npm run build

  rust-check:
    name: Rust (format + clippy + build)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: vibetrace-desktop/src-tauri

      - name: Check formatting
        working-directory: vibetrace-desktop/src-tauri
        run: cargo fmt --all -- --check

      - name: Setup Node (needed for tauri.conf.json)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install npm deps (needed for frontendDist)
        working-directory: vibetrace-desktop
        run: npm ci || npm install

      - name: Build frontend (required for tauri build context)
        working-directory: vibetrace-desktop
        run: npm run build

      - name: Clippy (lib only)
        working-directory: vibetrace-desktop/src-tauri
        run: cargo clippy --lib -- -D warnings

      - name: Build (lib only)
        working-directory: vibetrace-desktop/src-tauri
        run: cargo build --lib
