name: Release

# Trigger: push a tag like v0.1.0, or manual dispatch from Actions tab
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    name: Build Tauri app (${{ matrix.platform }})
    # MVP: 允许单个平台失败 (e.g. 临时编译问题)
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            artifact_glob: |
              src-tauri/target/**/bundle/dmg/*.dmg
              src-tauri/target/**/bundle/macos/*.app
              src-tauri/target/**/bundle/macos-apple-silicon/*.app
            artifact_name: VibeTrace-macOS-universal
          - platform: ubuntu-22.04
            args: ""
            artifact_glob: |
              src-tauri/target/**/bundle/deb/*.deb
              src-tauri/target/**/bundle/appimage/*.AppImage
              src-tauri/target/**/bundle/rpm/*.rpm
            artifact_name: VibeTrace-Linux
          - platform: windows-latest
            args: ""
            artifact_glob: |
              src-tauri/target/**/bundle/msi/*.msi
              src-tauri/target/**/bundle/nsis/*.exe
            artifact_name: VibeTrace-Windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: vibetrace-desktop/package-lock.json

      - name: Install npm deps
        working-directory: vibetrace-desktop
        run: npm ci || npm install

      - name: Build frontend (required for tauri)
        working-directory: vibetrace-desktop
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Use tagName = "latest" so all builds contribute to the same "Latest" release
          tagName: latest
          releaseName: "VibeTrace (Latest)"
          releaseBody: |
            ## VibeTrace Desktop - Latest Build

            Automated cross-platform build. See [README](https://github.com/sakurairo/VibeTrace#readme) for usage.

            ### Assets
            - **macOS**: Download the `.dmg` or `.app` and drag to Applications
            - **Linux**: Install the `.deb`/`.rpm`/`.AppImage`
            - **Windows**: Run the `.msi` or `.exe` installer
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload artifacts (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn
